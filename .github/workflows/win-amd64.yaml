name: windows amd64 build
on:
  - push
  - release
jobs:
  bunddle_app:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Setup Dependency
        run: |
          python -m pip install -r requirements-qqdebreath.txt
      - name: build app
        run: |
          python3 -m PyInstaller --noconfirm --clean .\QQDeBreathTool.spec
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: QQDeBreathTool_Win_amd64
          path: dist/QQDeBreathTool/QQDeBreathTool.exe
